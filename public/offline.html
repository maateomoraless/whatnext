<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#0a0a0a" />
    <title>Sin conexión — WhatNext?</title>
    <style>
      * {
        box-sizing: border-box;
      }
      html,
      body {
        margin: 0;
        min-height: 100%;
        background: #0a0a0a;
        color: #fafafa;
        font-family:
          ui-sans-serif,
          system-ui,
          -apple-system,
          BlinkMacSystemFont,
          "Segoe UI",
          Roboto,
          sans-serif;
        -webkit-font-smoothing: antialiased;
      }
      .wrap {
        min-height: 100dvh;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        padding: 2rem 1.5rem;
        text-align: center;
      }
      .mark {
        font-size: 3rem;
        font-weight: 700;
        line-height: 1;
        margin-bottom: 1rem;
        opacity: 0.9;
      }
      h1 {
        font-size: 1.25rem;
        font-weight: 600;
        margin: 0 0 0.5rem;
        letter-spacing: -0.02em;
      }
      p {
        margin: 0;
        font-size: 0.9375rem;
        line-height: 1.5;
        color: #a3a3a3;
        max-width: 20rem;
      }
    </style>
  </head>
  <body>
    <div class="wrap">
      <div class="mark" aria-hidden="true">?</div>
      <h1>Sin conexión</h1>
      <p>Comprueba tu conexión a internet e inténtalo de nuevo.</p>
    </div>
  </body>
</html>
